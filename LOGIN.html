<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="LOGIN.css">
</head>

<body>

    <div class="wrapper">
        <div class="form-wrapper sing-in">
            <form action="">
                <h2>Login</h2>
                <div class="input-group">
                    <input type="text" required>
                    <label for="">Username</label>
                </div>
                <div class="input-group">
                    <input type="password" required>
                    <label for="">Password</label>
                </div>
                <div class="remember">
                    <label><input type="checkbox"> Remember me</label>
                </div>
                <button type="submit">Login</button>
                <div class="singUp-link">
                    <p>Don't have an account? <a href="#" class="singUpBtn-link">Sing Up</a></p>
                </div>
            </form>
        </div>

        <div class="form-wrapper sing-up">
            <form action="">
                <h2>Sing Up</h2>
                <div class="input-group">
                    <input type="text" required>
                    <label for="">Username</label>
                </div>
                <div class="input-group">
                    <input type="email" required>
                    <label for="">Email</label>
                </div>
                <div class="input-group">
                    <input type="password" required>
                    <label for="">Password</label>
                </div>
                <div class="input-group">
                    <input type="password" required>
                    <label for="">Password</label>
                </div>
                <div class="remember">
                    <label><input type="checkbox"> I agree to the terms & conditions</label>
                </div>
                <button type="submit">Sing Up</button>
                <div class="singUp-link">
                    <p>Already have an account? <a href="#" class="singInBtn-link">Sing In</a></p>
                </div>
            </form>
        </div>
    </div>
    
    <script src="LOGIN.js"></script>
</body>
</html>
